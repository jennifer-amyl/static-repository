<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fresh Food Store</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
    }

    .product-img {
      height: 200px;
      width: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .product-img:hover {
      transform: scale(1.05);
    }

    .logo {
      width: 80px;
      height: 80px;
      object-fit: cover;
    }
  </style>
</head>

<body>

<div class="container my-5">

  <h1 class="text-center mb-5">Fresh Food Store</h1>

  <div class="row g-4">

    <!-- Apples -->
    <div class="col-md-3">
      <div class="card h-100 text-center">
        <img src="https://images.unsplash.com/photo-1567306226416-28f0efdc88ce?q=80&w=500"
             class="card-img-top product-img"
             alt="Apples">
        <div class="card-body">
          <h5 class="card-title">Apples</h5>
          <p class="card-text">£1.50</p>
          <button class="btn btn-success">Buy</button>
        </div>
      </div>
    </div>

    <!-- Bananas -->
    <div class="col-md-3">
      <div class="card h-100 text-center">
        <img src="https://platform.vox.com/wp-content/uploads/sites/2/chorus/uploads/chorus_asset/file/6225215/shutterstock_391404361.jpg?quality=90&strip=all&crop=0%2C6.989247311828%2C100%2C86.021505376344&w=2400"
             class="card-img-top product-img"
             alt="Bananas">
        <div class="card-body">
          <h5 class="card-title">Bananas</h5>
          <p class="card-text">£1.20</p>
          <button class="btn btn-success">Buy</button>
        </div>
      </div>
    </div>

    <!-- Melon -->
    <div class="col-md-3">
      <div class="card h-100 text-center">
        <img src="https://images.unsplash.com/photo-1571575173700-afb9492e6a50?q=80&w=500"
             class="card-img-top product-img"
             alt="Melon">
        <div class="card-body">
          <h5 class="card-title">Melon</h5>
          <p class="card-text">£2.50</p>
          <button class="btn btn-success">Buy</button>
        </div>
      </div>
    </div>

    <!-- Pears -->
    <div class="col-md-3">
      <div class="card h-100 text-center">
        <img src="https://images.unsplash.com/photo-1514756331096-242fdeb70d4a?q=80&w=500"
             class="card-img-top product-img"
             alt="Pears">
        <div class="card-body">
          <h5 class="card-title">Pears</h5>
          <p class="card-text">£1.80</p>
          <button class="btn btn-success">Buy</button>
        </div>
      </div>
    </div>

    <!-- Tomatoes -->
    <div class="col-md-3">
      <div class="card h-100 text-center">
        <img src="https://images.unsplash.com/photo-1546094096-0df4bcaaa337?q=80&w=500"
             class="card-img-top product-img"
             alt="Tomatoes">
        <div class="card-body">
          <h5 class="card-title">Tomatoes</h5>
          <p class="card-text">£1.40</p>
          <button class="btn btn-success">Buy</button>
        </div>
      </div>
    </div>

    <!-- Carrots -->
    <div class="col-md-3">
      <div class="card h-100 text-center">
        <img src="https://images.unsplash.com/photo-1447175008436-054170c2e979?q=80&w=500"
             class="card-img-top product-img"
             alt="Carrots">
        <div class="card-body">
          <h5 class="card-title">Carrots</h5>
          <p class="card-text">£1.00</p>
          <button class="btn btn-success">Buy</button>
        </div>
      </div>
    </div>

    <!-- Parsnips -->
    <div class="col-md-3">
      <div class="card h-100 text-center">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTH7giZhGr4a6k0o1MXCLExyHV8iw_wWAEbvZj7AiX3D7hkuaGfGh3ho1wm7ZtnVo5xR6i5gavcMAyZxWvuG6gN_CxaeE844aniq3Etjg&s=10"
             class="card-img-top product-img"
             alt="Parsnips">
        <div class="card-body">
          <h5 class="card-title">Parsnips</h5>
          <p class="card-text">£1.30</p>
          <button class="btn btn-success">Buy</button>
        </div>
      </div>
    </div>

    <!-- Potatoes -->
    <div class="col-md-3">
      <div class="card h-100 text-center">
        <img src="https://images.unsplash.com/photo-1518977676601-b53f82aba655?q=80&w=500"
             class="card-img-top product-img"
             alt="Potatoes">
        <div class="card-body">
          <h5 class="card-title">Potatoes</h5>
          <p class="card-text">£2.00</p>
          <button class="btn btn-success">Buy</button>
        </div>
      </div>
    </div>

    <!-- Onions -->
    <div class="col-md-3">
      <div class="card h-100 text-center">
        <img src="https://images.unsplash.com/photo-1508747703725-719777637510?q=80&w=500"
             class="card-img-top product-img"
             alt="Onions">
        <div class="card-body">
          <h5 class="card-title">Onions</h5>
          <p class="card-text">£1.10</p>
          <button class="btn btn-success">Buy</button>
        </div>
      </div>
    </div>

    <!-- Garlic -->
    <div class="col-md-3">
      <div class="card h-100 text-center">
        <img src="https://media.post.rvohealth.io/wp-content/uploads/2018/06/garlic-732x549-thumbnail.jpg"
             class="card-img-top product-img"
             alt="Garlic">
        <div class="card-body">
          <h5 class="card-title">Garlic</h5>
          <p class="card-text">£0.90</p>
          <button class="btn btn-success">Buy</button>
        </div>
      </div>
    </div>

  </div>

</div>

<footer class="bg-light p-4 mt-5">
  <div class="container">
    <div class="row align-items-center">

      <div class="col-md-2 text-center mb-3">
        <img src="https://images.unsplash.com/photo-1542838132-92c53300491e?q=80&w=200"
             class="logo"
             alt="Logo">
      </div>

      <div class="col-md-10">
        <form class="row g-3">

          <div class="col-md-4">
            <input type="text" class="form-control" placeholder="Full Name">
          </div>

          <div class="col-md-4">
            <input type="email" class="form-control" placeholder="Email Address">
          </div>

          <div class="col-md-4">
            <input type="tel" class="form-control" placeholder="Phone Number">
          </div>

          <div class="col-12">
            <button type="submit" class="btn btn-primary">Submit</button>
          </div>

        </form>
      </div>

    </div>
  </div>
</footer>

</body>
</html>
